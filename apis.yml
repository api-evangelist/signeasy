  - url: openapi/signeasy-openapi.yml
    type: OpenAPI
  - url: collections/signeasy.postman_collection.json
    type: PostmanCollection
  - url: collections/signeasy.opencollection.json
    type: OpenCollection
  description: Embed signing and sending directly in your web or mobile app. Create
    embedded signature requests (no Signeasy emails sent), generate per-recipient
    signing URLs to load in an iframe or pop-up, fetch an embedded sending URL to
    prepare and send documents, and cancel embedded signature requests.
- aid: signeasy:signeasy-webhooks-api
  name: Signeasy Webhooks API
  tags:
  - Webhooks
  - Events
  - Notifications
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.signeasy.com/docs/webhooks
  baseURL: https://api.signeasy.com/v3
  properties:
  - url: https://docs.signeasy.com/docs/webhooks
    type: Documentation
  - url: https://docs.signeasy.com/docs/webhooks
    type: APIReference
  - url: openapi/signeasy-openapi.yml
    type: OpenAPI
  description: Subscribe an HTTP endpoint to signature-request lifecycle events -
    rs.initiated, rs.link_sent, rs.viewed, rs.signed, rs.completed, rs.declined,
    rs.reminded, rs.expired, rs.voided, and document.signed. Signeasy POSTs an
    asynchronous payload (with event_user and metadata token) to your URL, retrying
    failures with exponential backoff over 24 hours. Subscriptions are configured in
    the developer portal.
