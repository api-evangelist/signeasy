  description: Create and send envelopes - signature requests composed of one or many
    original documents and templates, sent to up to 45 signers. Retrieve the envelope
    (pending file) object and its status, download the signed PDF, and cancel or void
    a signature request.
- aid: signeasy:signeasy-originals-api
