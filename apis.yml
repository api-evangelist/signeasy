aid: signeasy
url: https://raw.githubusercontent.com/api-evangelist/signeasy/refs/heads/main/apis.yml
name: Signeasy
kind: company
description: Signeasy is an eSignature and intelligent contract management platform
  used by tens of thousands of businesses to sign, send, and manage documents. The
  Signeasy API (v3) is a RESTful eSignature API that lets developers send documents
  for signature (envelopes), embed signing and sending flows directly inside their
  own web and mobile apps via iframes, manage reusable templates with merge fields,
  upload original documents, and receive real-time signature lifecycle notifications
  through webhooks. All endpoints are served from https://api.signeasy.com/v3 and
  authenticated with OAuth 2.0 Bearer access tokens (sandbox and live).
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- eSignature
- Electronic Signature
- Documents
- Contract Management
- Embedded Signing
- Templates
- Webhooks
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
