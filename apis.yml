  - url: collections/signeasy.opencollection.json
    type: OpenCollection
  description: Manage reusable templates - documents with predefined roles and merge
    fields that automate signature requests. Update a template and fetch an embedded
    template-creation URL so users can build or edit templates inside your own app in
    an iframe.
- aid: signeasy:signeasy-embedded-signing-api
  name: Signeasy Embedded Signing API
  tags:
  - Embedded Signing
  - Embedded Sending
  - iFrame
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.signeasy.com/docs/embedded-signing
  baseURL: https://api.signeasy.com/v3
  properties:
  - url: https://docs.signeasy.com/docs/embedded-signing
    type: Documentation
  - url: https://docs.signeasy.com/reference/fetch-rs-sending-url
