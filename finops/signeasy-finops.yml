meters:
- name: envelopes
  description: Legally binding eSignature requests sent per month; the primary billing metric. One envelope = one request regardless of documents, fields, or signers.
  unit: envelopes
  aggregation: sum
  dimensions:
  - account
  - app
- name: subscription
  description: Recurring tier subscription fee (Intermediate, Advanced) billed monthly or annually.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: overage_envelopes
  description: Envelopes sent above the plan allowance / Fair Usage threshold (rate unconfirmed).
  unit: envelopes
  aggregation: sum
  dimensions:
  - account
- name: apps
  description: Number of OAuth applications provisioned (capped per tier).
  unit: apps
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track envelope volume per app and account against the plan allowance; use the Fetch User envelope_credits value and detailed API logs (Enterprise) to monitor consumption.
- name: Allocation
  description: Provision one OAuth app per workload/team so envelope usage maps to internal cost centers within the plan app limit.
- name: Optimization
  description: Right-size the tier to actual monthly envelope volume, consolidate multiple documents into a single envelope (one request), and use templates to reduce rework; avoid overage by upgrading before exceeding the allowance.
- name: Accountability
  description: Assign owners per app; review monthly envelope volume against the plan allowance and the annual-vs-monthly billing tradeoff.
