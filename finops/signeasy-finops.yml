description: >-
  FinOps view of Signeasy API spend. Signeasy is billed as a tiered subscription
  metered primarily on legally binding eSignature requests (envelopes) per month:
  a free Starter/sandbox tier for evaluation, paid Intermediate ($125/mo) and
  Advanced ($250/mo) tiers with escalating envelope allowances and features, and
  a custom Enterprise tier for high volume. The dominant cost driver is envelope
  volume; secondary considerations are app count limits per tier and any Fair
  Usage / overage charges above the plan allowance.
notes: >-
  Reported overage (~$0.10 per envelope above ~10,000/month) and a custom API
  access fee (~$300/year per integration) come from third-party summaries and
  are NOT reconciled against the official pricing page. Verify all rates and
  overage terms with Signeasy during reconciliation.
